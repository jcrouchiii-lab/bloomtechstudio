<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Populr Flow</title>
  <style>
    body {
      background: #000;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      font-family: sans-serif;
      color: #fff;
    }
    .step { text-align: center; }
    .step h2 { margin: 0 0 12px; font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6; }
    .step img { display: block; max-width: 100%; width: 680px; }
  </style>
</head>
<body>
  <div class="step">
    <h2>Step 1</h2>
    <img src="populr-step1.png" alt="Step 1" />
  </div>
  <div class="step">
    <h2>Step 2</h2>
    <img src="populr-step2.png" alt="Step 2" />
  </div>
  <div class="step">
    <h2>Step 3</h2>
    <img src="populr-step3.png" alt="Step 3" />
  </div>
</body>
</html>
